<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bobathon Voting</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .bob-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            display: block;
            border-radius: 50%;
            background: white;
            padding: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .trophy {
            font-size: 4em;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.3em;
            opacity: 0.9;
        }

        .connection-status {
            text-align: center;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 10px;
            font-weight: bold;
        }

        .connection-status.connected {
            background: rgba(56, 239, 125, 0.2);
            color: #38ef7d;
        }

        .connection-status.disconnected {
            background: rgba(235, 51, 73, 0.2);
            color: #eb3349;
        }

        .connection-status.loading {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .project-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .project-card.voted {
            border: 4px solid #ffd700;
            background: linear-gradient(135deg, #fff9e6 0%, #ffffff 100%);
        }

        .project-card.voted::before {
            content: '⭐';
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 2em;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .flag {
            font-size: 4em;
            text-align: center;
            margin-bottom: 15px;
            cursor: text;
        }

        .flag.editable {
            border: 2px dashed #ccc;
            padding: 10px;
            border-radius: 5px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .flag.editable:hover {
            border-color: #667eea;
            background: #f9f9f9;
        }

        .flag.editable:empty:before {
            content: 'Click to add emoji';
            color: #999;
            font-size: 0.5em;
        }

        .project-title {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .project-title.editable {
            border: 2px dashed #ccc;
            padding: 10px;
            border-radius: 5px;
            cursor: text;
        }

        .project-title.editable:hover {
            border-color: #667eea;
            background: #f9f9f9;
        }

        .project-description {
            color: #666;
            line-height: 1.6;
            margin-bottom: 15px;
            min-height: 60px;
            font-style: italic;
        }

        .project-description.editable {
            border: 2px dashed #ccc;
            padding: 10px;
            border-radius: 5px;
            cursor: text;
        }

        .project-description.editable:hover {
            border-color: #667eea;
            background: #f9f9f9;
        }

        .vote-count {
            text-align: center;
            font-size: 1.2em;
            color: #667eea;
            font-weight: bold;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #eee;
        }

        .vote-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .vote-button:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .vote-button:active:not(:disabled) {
            transform: scale(0.98);
        }

        .vote-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .vote-button.voted {
            background: linear-gradient(135deg, #38ef7d 0%, #11998e 100%);
        }

        .results-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-top: 30px;
        }

        .results-title {
            font-size: 2em;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .winner-announcement {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }

        .winner-announcement h2 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }

        .winner-flag {
            font-size: 5em;
            margin: 20px 0;
        }

        .results-list {
            list-style: none;
        }

        .result-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: #f5f5f5;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .result-item:hover {
            background: #e8e8e8;
        }

        .result-rank {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
            margin-right: 15px;
            min-width: 40px;
        }

        .result-flag {
            font-size: 2em;
            margin-right: 15px;
        }

        .result-info {
            flex: 1;
        }

        .result-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .result-votes {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
            margin-left: auto;
        }

        .control-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .control-button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .show-results-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .edit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .edit-btn.active {
            background: linear-gradient(135deg, #38ef7d 0%, #11998e 100%);
        }

        .control-button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .hidden {
            display: none;
        }

        .no-event {
            text-align: center;
            color: white;
            padding: 50px;
            font-size: 1.5em;
        }

        .voted-indicator {
            background: #38ef7d;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            display: inline-block;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }
            
            .projects-grid {
                grid-template-columns: 1fr;
            }
            
            .control-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="Bob Icon.png" alt="Bob" class="bob-icon" />
            <h1 id="eventTitle">Loading...</h1>
            <p class="subtitle" id="eventSubtitle">Vote for Your Favorite Hackathon Project!</p>
        </header>

        <div id="connectionStatus" class="connection-status loading">
            🔄 Connecting...
        </div>

        <div id="noEventMessage" class="no-event hidden">
            <p>No active Bobathon event at the moment.</p>
            <p style="font-size: 0.8em; margin-top: 20px;">Check back later or contact the organizer.</p>
        </div>

        <div id="votingSection">
            <div class="control-buttons">
                <button class="control-button edit-btn" id="editBtn" onclick="toggleEditMode()">
                    📝 Edit Your Project Info
                </button>
                <button class="control-button show-results-btn" onclick="showResults()">
                    📊 Show Results
                </button>
            </div>

            <div class="projects-grid" id="projectsGrid">
                <!-- Projects will be dynamically generated -->
            </div>
        </div>

        <div id="resultsSection" class="results-section hidden">
            <h2 class="results-title">🏆 Final Results 🏆</h2>
            <div id="winnerAnnouncement"></div>
            <ul class="results-list" id="resultsList"></ul>
            <div class="control-buttons">
                <button class="control-button show-results-btn" onclick="backToVoting()">
                    ← Back to Voting
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, get, update, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCITNIV6RyoCgIQJziv9WYxOGPq-1-ct04",
            authDomain: "bobathon-voting.firebaseapp.com",
            databaseURL: "https://bobathon-voting-default-rtdb.firebaseio.com",
            projectId: "bobathon-voting",
            storageBucket: "bobathon-voting.firebasestorage.app",
            messagingSenderId: "88996679714",
            appId: "1:88996679714:web:13f4b19f7dacbb05ffba7b"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        let currentEvent = null;
        let projects = [];
        let editMode = false;
        let hasVoted = false;
        let votedProjectId = null;

        // Check if user has already voted (browser-based)
        function checkVotingStatus() {
            if (!currentEvent) return;
            const votedKey = `voted_${currentEvent.id}`;
            const voted = localStorage.getItem(votedKey);
            if (voted) {
                hasVoted = true;
                votedProjectId = parseInt(voted);
            }
        }

        // Mark as voted
        function markAsVoted(projectId) {
            if (!currentEvent) return;
            const votedKey = `voted_${currentEvent.id}`;
            localStorage.setItem(votedKey, projectId.toString());
            hasVoted = true;
            votedProjectId = projectId;
        }

        // Update connection status
        function updateConnectionStatus(status, message) {
            const statusDiv = document.getElementById('connectionStatus');
            statusDiv.className = `connection-status ${status}`;
            statusDiv.textContent = message;
        }

        // Load active event
        async function loadActiveEvent() {
            try {
                const settingsRef = ref(database, 'settings/activeEventId');
                const snapshot = await get(settingsRef);
                
                if (!snapshot.exists()) {
                    updateConnectionStatus('disconnected', '❌ No active event');
                    document.getElementById('noEventMessage').classList.remove('hidden');
                    document.getElementById('votingSection').classList.add('hidden');
                    return;
                }

                const activeEventId = snapshot.val();
                const eventRef = ref(database, `events/${activeEventId}`);
                
                onValue(eventRef, (eventSnapshot) => {
                    if (eventSnapshot.exists()) {
                        currentEvent = eventSnapshot.val();
                        projects = currentEvent.projects || [];
                        
                        document.getElementById('eventTitle').textContent = currentEvent.title;
                        document.getElementById('eventSubtitle').textContent = `${currentEvent.date} | Vote for Your Favorite Project!`;
                        
                        updateConnectionStatus('connected', '✅ Connected - Real-time voting active!');
                        checkVotingStatus();
                        renderProjects();
                    } else {
                        updateConnectionStatus('disconnected', '❌ Event not found');
                    }
                });
            } catch (error) {
                console.error('Error loading event:', error);
                updateConnectionStatus('disconnected', '❌ Connection error');
            }
        }

        // Toggle edit mode
        window.toggleEditMode = function() {
            editMode = !editMode;
            const btn = document.getElementById('editBtn');
            btn.classList.toggle('active');
            btn.textContent = editMode ? '✅ Done Editing' : '📝 Edit Your Project Info';
            renderProjects();
        }

        // Render projects
        function renderProjects() {
            const grid = document.getElementById('projectsGrid');
            grid.innerHTML = '';

            const visibleProjects = projects.filter(p => p.visible !== false);

            visibleProjects.forEach(project => {
                const card = document.createElement('div');
                card.className = 'project-card';
                if (hasVoted && votedProjectId === project.id) {
                    card.classList.add('voted');
                }
                card.id = `project-${project.id}`;

                const emojiClass = editMode ? 'flag editable' : 'flag';
                const emojiContent = editMode ?
                    `<div class="${emojiClass}" contenteditable="true" onblur="saveEmoji(${project.id}, this.textContent)">${project.emoji}</div>` :
                    `<div class="${emojiClass}">${project.emoji}</div>`;

                const titleClass = editMode ? 'project-title editable' : 'project-title';
                const titleContent = editMode ?
                    `<div class="${titleClass}" contenteditable="true" onblur="saveTitle(${project.id}, this.textContent)">${project.title}</div>` :
                    `<div class="${titleClass}">${project.title}</div>`;

                const descClass = editMode ? 'project-description editable' : 'project-description';
                const descContent = editMode ?
                    `<div class="${descClass}" contenteditable="true" onblur="saveDescription(${project.id}, this.textContent)">${project.description}</div>` :
                    `<div class="${descClass}">${project.description}</div>`;

                const voteButtonText = hasVoted && votedProjectId === project.id ?
                    '✅ You Voted for This!' :
                    hasVoted ? 'Already Voted' : `Vote for ${project.title}`;
                
                const voteButtonClass = hasVoted && votedProjectId === project.id ? 'vote-button voted' : 'vote-button';
                const voteButtonDisabled = hasVoted && votedProjectId !== project.id;

                card.innerHTML = `
                    ${emojiContent}
                    ${titleContent}
                    ${descContent}
                    ${!editMode ? `
                        <button class="${voteButtonClass}" onclick="vote(${project.id})" ${voteButtonDisabled ? 'disabled' : ''}>
                            ${voteButtonText}
                        </button>
                        <div class="vote-count">Votes: ${project.votes || 0}</div>
                    ` : `
                        <p style="text-align: center; color: #667eea; margin-top: 15px;">
                            Click on emoji, title, or description to edit
                        </p>
                    `}
                `;

                grid.appendChild(card);
            });
        }

        // Save emoji
        window.saveEmoji = async function(projectId, text) {
            if (!currentEvent) return;
            const projectIndex = projects.findIndex(p => p.id === projectId);
            if (projectIndex !== -1) {
                const updates = {};
                updates[`events/${currentEvent.id}/projects/${projectIndex}/emoji`] = text.trim();
                await update(ref(database), updates);
            }
        }

        // Save title
        window.saveTitle = async function(projectId, text) {
            if (!currentEvent) return;
            const projectIndex = projects.findIndex(p => p.id === projectId);
            if (projectIndex !== -1) {
                const updates = {};
                updates[`events/${currentEvent.id}/projects/${projectIndex}/title`] = text.trim();
                await update(ref(database), updates);
            }
        }

        // Save description
        window.saveDescription = async function(projectId, text) {
            if (!currentEvent) return;
            const projectIndex = projects.findIndex(p => p.id === projectId);
            if (projectIndex !== -1) {
                const updates = {};
                updates[`events/${currentEvent.id}/projects/${projectIndex}/description`] = text.trim();
                await update(ref(database), updates);
            }
        }

        // Vote for a project
        window.vote = async function(projectId) {
            if (hasVoted) {
                alert('You have already voted in this Bobathon!');
                return;
            }

            if (!currentEvent) return;
            
            const projectIndex = projects.findIndex(p => p.id === projectId);
            if (projectIndex !== -1) {
                const newVotes = (projects[projectIndex].votes || 0) + 1;
                const updates = {};
                updates[`events/${currentEvent.id}/projects/${projectIndex}/votes`] = newVotes;
                await update(ref(database), updates);
                
                markAsVoted(projectId);
                renderProjects();
                
                // Visual feedback
                const card = document.getElementById(`project-${projectId}`);
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // Show results
        window.showResults = function() {
            document.getElementById('votingSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.remove('hidden');

            const visibleProjects = projects.filter(p => p.visible !== false);
            const sorted = [...visibleProjects].sort((a, b) => (b.votes || 0) - (a.votes || 0));

            const winner = sorted[0];
            const winnerDiv = document.getElementById('winnerAnnouncement');
            winnerDiv.innerHTML = `
                <div class="winner-announcement">
                    <h2>🎉 Winner! 🎉</h2>
                    <div class="winner-flag">${winner.emoji}</div>
                    <h2>${winner.title}</h2>
                    <p style="font-size: 1.5em; margin-top: 10px;">${winner.votes || 0} votes</p>
                </div>
            `;

            const resultsList = document.getElementById('resultsList');
            resultsList.innerHTML = '';
            sorted.forEach((project, index) => {
                const li = document.createElement('li');
                li.className = 'result-item';
                li.innerHTML = `
                    <div class="result-rank">#${index + 1}</div>
                    <div class="result-flag">${project.emoji}</div>
                    <div class="result-info">
                        <div class="result-title">${project.title}</div>
                    </div>
                    <div class="result-votes">${project.votes || 0} votes</div>
                `;
                resultsList.appendChild(li);
            });
        }

        // Back to voting
        window.backToVoting = function() {
            document.getElementById('resultsSection').classList.add('hidden');
            document.getElementById('votingSection').classList.remove('hidden');
        }

        // Initialize
        loadActiveEvent();
    </script>
</body>
</html>
